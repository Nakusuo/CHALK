<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chalk — Explora docentes por facultad en la UTP.">
    <title>Facultades · Chalk UTP</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="topbar-container"></div>
    <main class="page-wrap">
        <div class="page-title-row fadein">
            <div>
                <h1 class="page-title">🎓 Facultades</h1>
                <p class="page-subtitle">Explora docentes organizados por facultad y carrera</p>
            </div>
        </div>
        <div class="fac-grid" id="fac-grid"></div>
        <div id="fac-detail" style="display:none"></div>
    </main>
    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = components.requireAuth();
        if (user) {
            components.renderTopbar("facultades");
            _renderFaculties();
        }

        function _renderFaculties() {
            const grid = document.getElementById("fac-grid");
            grid.innerHTML = DB.faculties.map(f => {
                const profs = DB.professors.filter(p => p.fac === f.id);
                const count = profs.length;
                const avg = count > 0 ? (profs.reduce((s, p) => s + DB.getProfScore(p.id), 0) / count).toFixed(1) : "—";
                const courses = [...new Set(profs.flatMap(p => p.courses))];
                const sedes = [...new Set(profs.flatMap(p => p.sedes || []))];
                return `
                    <div class="fac-card fadein" onclick="_showFacDetail('${f.id}')">
                        <div class="fac-card-icon">${f.icon}</div>
                        <div class="fac-card-name">${f.name}</div>
                        <div class="fac-card-stats">
                            <div class="fac-stat">
                                <span class="fac-stat-val">${count}</span>
                                <span class="fac-stat-label">Docentes</span>
                            </div>
                            <div class="fac-stat">
                                <span class="fac-stat-val" style="color:var(--utp-red)">${avg}</span>
                                <span class="fac-stat-label">Promedio</span>
                            </div>
                            <div class="fac-stat">
                                <span class="fac-stat-val">${courses.length}</span>
                                <span class="fac-stat-label">Cursos</span>
                            </div>
                        </div>
                        <div class="fac-card-sedes">
                            📍 ${sedes.slice(0, 3).map(s => DB.getSedeName(s)).join(", ")}${sedes.length > 3 ? ` +${sedes.length - 3}` : ""}
                        </div>
                    </div>
                `;
            }).join("");
        }

        function _showFacDetail(facId) {
            const fac = DB.faculties.find(f => f.id === facId);
            const profs = DB.professors.filter(p => p.fac === facId);
            const courses = [...new Set(profs.flatMap(p => p.courses))];
            const detail = document.getElementById("fac-detail");
            const grid = document.getElementById("fac-grid");

            grid.style.display = "none";
            detail.style.display = "block";

            detail.innerHTML = `
                <div class="fadein">
                    <button class="btn btn-ghost" onclick="_backToFacs()" style="margin-bottom:var(--space-4)">← Todas las facultades</button>
                    <div class="prof-header-card" style="margin-bottom:var(--space-5)">
                        <div class="prof-title">${fac.icon} ${fac.name}</div>
                        <div class="prof-subtitle">${profs.length} docentes · ${courses.length} cursos</div>
                        <div class="prof-badges">
                            ${courses.map(c => `<span class="mini-tag mini-tag-accent">📚 ${c}</span>`).join("")}
                        </div>
                    </div>

                    <div class="section-label">Docentes de esta facultad</div>
                    <div class="prof-list">
                        ${profs.sort((a, b) => DB.getProfScore(b.id) - DB.getProfScore(a.id)).map((p, i) => {
                            const score = DB.getProfScore(p.id);
                            const badge = DB.getProfBadge(p);
                            const sedeNames = (p.sedes || []).map(s => DB.getSedeName(s)).join(", ");
                            return `
                                <div class="prow fadein stagger-${Math.min(i+1,6)}" onclick="window.location.href='professor.html?id=${p.id}'">
                                    <div class="prow-av">${p.emoji}</div>
                                    <div class="prow-body">
                                        <div class="prow-name">${p.name} ${p.verified ? '<span class="prow-verified">✔ Verificado</span>' : ""} ${badge ? components.badgeHtml(badge) : ""}</div>
                                        <div class="prow-dept">${p.dept} · 📍 ${sedeNames}</div>
                                        <div class="prow-tags">
                                            ${p.courses.map(c => `<span class="mini-tag mini-tag-accent">📚 ${c}</span>`).join("")}
                                        </div>
                                    </div>
                                    <div class="prow-right">
                                        <div class="big-score">${score.toFixed(1)}</div>
                                        <div class="big-score-label">/ 5.0</div>
                                        <div class="stars-sm">${DB.starsHtml(score)}</div>
                                    </div>
                                </div>
                            `;
                        }).join("")}
                    </div>
                </div>
            `;
        }

        function _backToFacs() {
            document.getElementById("fac-grid").style.display = "";
            document.getElementById("fac-detail").style.display = "none";
        }
    </script>
</body>
</html>
