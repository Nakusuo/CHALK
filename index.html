<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chalk — Inicia sesión con tu correo institucional UTP para calificar docentes.">
    <title>Iniciar sesión · Chalk UTP</title>

    <!-- CSS -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/login.css">
</head>
<body>

    <!-- Topbar (renderizado por JS) -->
    <div id="topbar-container"></div>

    <!-- Contenido: Formulario de login -->
    <main>
        <div class="login-wrap">
            <div class="login-card">
                <img src="CHALK.png" alt="Chalk UTP" style="height:80px;width:auto;margin:0 auto var(--space-3);display:block">
                <div class="login-sub">Plataforma de docentes UTP — Comunidad cerrada</div>

                <div class="field-wrap">
                    <label class="field-label" for="login-email">Correo institucional</label>
                    <input class="fld" id="login-email" type="email" placeholder="U20231234@utp.edu.pe">
                    <div class="err" id="login-email-err">Debe ser @utp.edu.pe con código que empiece en U</div>
                </div>

                <div class="field-wrap">
                    <label class="field-label" for="login-pass">Contraseña</label>
                    <input class="fld" id="login-pass" type="password" placeholder="••••••••">
                    <div class="err" id="login-pass-err">Ingresa tu contraseña</div>
                </div>

                <button class="btn btn-primary btn-full" style="padding:10px" onclick="auth.login()">Ingresar</button>

                <div class="divider-line">o</div>

                <a class="btn btn-full" href="register.html" style="padding:10px; text-decoration:none">Crear cuenta nueva</a>

                <div class="hint-box">
                    🔒 Solo acceso con correo <strong>@utp.edu.pe</strong> cuyo código empiece con <strong>U</strong> (estudiantes activos).
                </div>
            </div>
        </div>
    </main>

    <!-- JS -->
    <script src="js/storage.js"></script>
    <script src="js/components.js"></script>
    <script src="js/auth.js"></script>
    <script>
        // Si ya hay sesión activa, ir directo al home
        if (!components.redirectIfAuth()) {
            components.renderTopbar("guest");
        }
    </script>

</body>
</html>
