<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chalk — Compara dos docentes UTP lado a lado.">
    <title>Comparar · Chalk UTP</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="topbar-container"></div>
    <main class="page-wrap">
        <div class="page-title-row fadein">
            <div>
                <h1 class="page-title">⚡ Comparar docentes</h1>
                <p class="page-subtitle">Selecciona dos docentes para compararlos lado a lado</p>
            </div>
        </div>

        <!-- Selectores -->
        <div class="compare-selectors fadein">
            <div class="compare-select-card">
                <div class="compare-select-label">Docente A</div>
                <select class="fld" id="compare-a" onchange="_doCompare()">
                    <option value="">Selecciona un docente</option>
                </select>
            </div>
            <div class="compare-vs">VS</div>
            <div class="compare-select-card">
                <div class="compare-select-label">Docente B</div>
                <select class="fld" id="compare-b" onchange="_doCompare()">
                    <option value="">Selecciona un docente</option>
                </select>
            </div>
        </div>

        <!-- Filtro opcional de curso -->
        <div class="fadein" style="margin-bottom:var(--space-5);display:flex;align-items:center;gap:var(--space-3)">
            <span style="font-size:11px;font-weight:600;color:var(--color-text-muted);text-transform:uppercase;letter-spacing:0.5px">Filtrar por curso</span>
            <select class="fld" id="compare-course-filter" onchange="_filterByCourse()" style="max-width:260px;font-size:12px">
                <option value="all">Todos los docentes</option>
            </select>
        </div>

        <!-- Resultado de la comparación -->
        <div id="compare-result"></div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const user = components.requireAuth();
        if (user) {
            components.renderTopbar("compare");
            _initCompare();
        }

        function _initCompare() {
            // Llenar selectores con todos los profesores
            _populateSelectors(DB.professors);

            // Llenar filtro de cursos
            const courseFilter = document.getElementById("compare-course-filter");
            const courses = DB.getAllCourses();
            courses.sort((a, b) => a.name.localeCompare(b.name));
            courses.forEach(c => {
                const opt = document.createElement("option");
                opt.value = c.name;
                opt.textContent = `📚 ${c.name} (${c.profs.length} docentes)`;
                courseFilter.appendChild(opt);
            });

            // Verificar si viene un curso por URL (?c=NombreCurso)
            const urlCourse = components.getUrlParam("c");
            if (urlCourse) {
                courseFilter.value = urlCourse;
                _filterByCourse();
            }

            // Verificar si vienen IDs por URL (?a=1&b=2)
            const urlA = components.getUrlParam("a");
            const urlB = components.getUrlParam("b");
            if (urlA) document.getElementById("compare-a").value = urlA;
            if (urlB) document.getElementById("compare-b").value = urlB;
            if (urlA && urlB) _doCompare();
            else _showEmpty();
        }

        function _populateSelectors(profs) {
            const selA = document.getElementById("compare-a");
            const selB = document.getElementById("compare-b");
            const valA = selA.value;
            const valB = selB.value;

            // Limpiar y re-llenar
            selA.innerHTML = '<option value="">Selecciona un docente</option>';
            selB.innerHTML = '<option value="">Selecciona un docente</option>';

            profs.sort((a, b) => a.name.localeCompare(b.name)).forEach(p => {
                const score = DB.getProfScore(p.id).toFixed(1);
                const optA = document.createElement("option");
                optA.value = p.id;
                optA.textContent = `${p.emoji} ${p.name} (${score})`;
                selA.appendChild(optA);

                const optB = document.createElement("option");
                optB.value = p.id;
                optB.textContent = `${p.emoji} ${p.name} (${score})`;
                selB.appendChild(optB);
            });

            // Restaurar selección si es válida
            if (valA && profs.find(p => p.id == valA)) selA.value = valA;
            if (valB && profs.find(p => p.id == valB)) selB.value = valB;
        }

        function _filterByCourse() {
            const courseFilter = document.getElementById("compare-course-filter");
            const courseName = courseFilter.value;

            if (courseName === "all") {
                _populateSelectors(DB.professors);
            } else {
                const profs = DB.professors.filter(p => p.courses.includes(courseName));
                _populateSelectors(profs);
            }
            _doCompare();
        }

        function _showEmpty() {
            const result = document.getElementById("compare-result");
            result.innerHTML = `
                <div class="compare-empty fadein">
                    <div class="compare-empty-icon">⚡</div>
                    <div class="compare-empty-title">Selecciona dos docentes</div>
                    <div class="compare-empty-desc">
                        Usa los selectores de arriba para elegir dos docentes y compararlos lado a lado.
                        También puedes filtrar por curso para ver solo los docentes de esa materia.
                    </div>
                </div>
            `;
        }

        function _doCompare() {
            const idA = parseInt(document.getElementById("compare-a").value);
            const idB = parseInt(document.getElementById("compare-b").value);

            if (!idA || !idB) {
                if (!idA && !idB) _showEmpty();
                return;
            }

            if (idA === idB) {
                document.getElementById("compare-result").innerHTML = `
                    <div class="compare-empty fadein">
                        <div class="compare-empty-icon">🤔</div>
                        <div class="compare-empty-title">Mismo docente</div>
                        <div class="compare-empty-desc">Selecciona dos docentes diferentes para comparar.</div>
                    </div>
                `;
                return;
            }

            const pA = DB.getProfessor(idA);
            const pB = DB.getProfessor(idB);
            if (!pA || !pB) return;

            const scoreA = DB.getProfScore(pA.id);
            const scoreB = DB.getProfScore(pB.id);
            const result = document.getElementById("compare-result");

            const criteriaKeys = Object.keys(DB.criteriaLabels);

            result.innerHTML = `
                <div class="fadein">
                    <!-- Columnas principales -->
                    <div class="compare-result">
                        ${_buildCompareCol(pA, scoreA, pB, scoreB, "a")}
                        ${_buildCompareCol(pB, scoreB, pA, scoreA, "b")}
                    </div>

                    <!-- Criterios lado a lado -->
                    <div style="margin-top:var(--space-5)">
                        <div class="section-label">📊 Criterios de evaluación — Comparación</div>
                        <div class="compare-criteria-grid" style="background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:var(--radius-xl);overflow:hidden">
                            ${criteriaKeys.map(key => {
                                const valA = pA.criteria[key] || 0;
                                const valB = pB.criteria[key] || 0;
                                const winA = valA > valB;
                                const winB = valB > valA;
                                return `
                                    <div class="compare-crit-card" style="border-right:1px solid var(--color-border-subtle)">
                                        <div class="compare-crit-label">${DB.criteriaLabels[key]} — ${pA.name.split(" ").slice(1, 3).join(" ")}</div>
                                        <div class="compare-crit-bar">
                                            <div class="compare-crit-track">
                                                <div class="compare-crit-fill" style="width:${(valA/5)*100}%;background:${winA ? 'var(--color-success)' : 'var(--utp-red)'}"></div>
                                            </div>
                                            <span class="compare-crit-val" style="color:${winA ? 'var(--color-success)' : 'var(--color-text-secondary)'}">${valA.toFixed(1)}</span>
                                        </div>
                                    </div>
                                    <div class="compare-crit-card">
                                        <div class="compare-crit-label">${DB.criteriaLabels[key]} — ${pB.name.split(" ").slice(1, 3).join(" ")}</div>
                                        <div class="compare-crit-bar">
                                            <div class="compare-crit-track">
                                                <div class="compare-crit-fill" style="width:${(valB/5)*100}%;background:${winB ? 'var(--color-success)' : 'var(--utp-red)'}"></div>
                                            </div>
                                            <span class="compare-crit-val" style="color:${winB ? 'var(--color-success)' : 'var(--color-text-secondary)'}">${valB.toFixed(1)}</span>
                                        </div>
                                    </div>
                                `;
                            }).join("")}
                        </div>
                    </div>

                    <!-- Veredicto -->
                    <div style="margin-top:var(--space-5);text-align:center;padding:var(--space-5);background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:var(--radius-xl)">
                        ${_buildVerdict(pA, scoreA, pB, scoreB)}
                    </div>
                </div>
            `;
        }

        function _buildCompareCol(prof, score, otherProf, otherScore, side) {
            const isWinner = score > otherScore;
            const badge = DB.getProfBadge(prof);
            const diffColor = DB.getDifficultyColor(prof.difficulty);
            const sedeNames = (prof.sedes || []).map(s => DB.getSedeName(s)).join(", ");
            const reviews = DB.getProfReviewCount(prof.id);

            return `
                <div class="compare-col" style="${isWinner ? 'border-color:var(--color-border-accent);box-shadow:var(--shadow-glow-sm)' : ''}">
                    <div class="compare-col-header" style="position:relative">
                        ${isWinner ? '<div style="position:absolute;top:8px;right:12px;font-size:18px">🏆</div>' : ''}
                        <div style="font-size:28px;margin-bottom:8px">${prof.emoji}</div>
                        <div class="compare-col-name">${prof.name}</div>
                        <div class="compare-col-dept">${prof.dept}</div>
                        ${badge ? `<div style="margin-top:8px">${components.badgeHtml(badge)}</div>` : ""}
                        <div class="compare-col-score">${score.toFixed(1)}<span style="font-size:16px;opacity:.4;font-weight:400">/5</span></div>
                        <div class="stars-sm" style="font-size:16px">${DB.starsHtml(score)}</div>
                    </div>
                    <div class="compare-col-body">
                        <div class="compare-row">
                            <span class="compare-row-label">Reseñas</span>
                            <span class="compare-row-val">${reviews}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-row-label">Dificultad</span>
                            <span class="compare-row-val" style="color:${diffColor}">${prof.difficulty.toFixed(1)} — ${DB.getDifficultyLabel(prof.difficulty)}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-row-label">Lo tomaría de nuevo</span>
                            <span class="compare-row-val ${prof.wouldTakeAgain > otherProf.wouldTakeAgain ? 'winner' : prof.wouldTakeAgain < otherProf.wouldTakeAgain ? 'loser' : ''}">${prof.wouldTakeAgain}%</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-row-label">Aprendizaje</span>
                            <span class="compare-row-val ${prof.learningScore > otherProf.learningScore ? 'winner' : prof.learningScore < otherProf.learningScore ? 'loser' : ''}">${prof.learningScore}%</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-row-label">Aprobación</span>
                            <span class="compare-row-val ${prof.approvalRate > otherProf.approvalRate ? 'winner' : prof.approvalRate < otherProf.approvalRate ? 'loser' : ''}">${prof.approvalRate}%</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-row-label">Carga</span>
                            <span class="compare-row-val">${DB.workloadLabels[prof.workload]}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-row-label">Experiencia</span>
                            <span class="compare-row-val">${prof.experience}</span>
                        </div>
                        <div class="compare-row">
                            <span class="compare-row-label">Sedes</span>
                            <span class="compare-row-val" style="font-family:var(--font-sans);font-size:11px;text-align:right;max-width:140px">${sedeNames}</span>
                        </div>
                        <div style="margin-top:var(--space-3)">
                            <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-text-muted);margin-bottom:6px">Cursos</div>
                            ${prof.courses.map(c => {
                                const cScore = prof.courseRatings?.[c];
                                return `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;color:var(--color-text-secondary)">
                                    <span>📚 ${c}</span>
                                    ${cScore ? `<span style="font-weight:700;color:var(--utp-red);font-family:var(--font-mono)">${cScore.toFixed(1)}</span>` : ""}
                                </div>`;
                            }).join("")}
                        </div>
                    </div>
                </div>
            `;
        }

        function _buildVerdict(pA, scoreA, pB, scoreB) {
            // Score overall comparison
            let winsA = 0, winsB = 0;
            const metrics = [
                { a: scoreA, b: scoreB },
                { a: pA.wouldTakeAgain, b: pB.wouldTakeAgain },
                { a: pA.learningScore, b: pB.learningScore },
                { a: pA.approvalRate, b: pB.approvalRate },
                { a: 5 - pA.difficulty, b: 5 - pB.difficulty }, // Lower difficulty = better
            ];
            // Add criteria
            Object.keys(DB.criteriaLabels).forEach(key => {
                metrics.push({ a: pA.criteria[key] || 0, b: pB.criteria[key] || 0 });
            });

            metrics.forEach(m => {
                if (m.a > m.b) winsA++;
                else if (m.b > m.a) winsB++;
            });

            const winner = winsA > winsB ? pA : winsB > winsA ? pB : null;

            if (!winner) {
                return `
                    <div style="font-size:28px;margin-bottom:8px">🤝</div>
                    <div style="font-size:16px;font-weight:700;color:var(--utp-white);margin-bottom:4px">¡Empate técnico!</div>
                    <div style="font-size:12px;color:var(--color-text-tertiary)">Ambos docentes tienen métricas muy similares. Revisa los detalles para decidir.</div>
                    <div style="margin-top:12px;font-size:11px;color:var(--color-text-muted);font-family:var(--font-mono)">
                        ${pA.name.split(" ").slice(1,3).join(" ")}: ${winsA} victorias · ${pB.name.split(" ").slice(1,3).join(" ")}: ${winsB} victorias
                    </div>
                `;
            }

            return `
                <div style="font-size:28px;margin-bottom:8px">🏆</div>
                <div style="font-size:16px;font-weight:700;color:var(--utp-white);margin-bottom:4px">
                    ${winner.name} gana la comparación
                </div>
                <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:8px">
                    Supera en ${Math.max(winsA, winsB)} de ${metrics.length} métricas evaluadas
                </div>
                <div style="display:flex;justify-content:center;gap:var(--space-6);margin-top:12px">
                    <div style="text-align:center">
                        <div style="font-size:22px;font-weight:800;font-family:var(--font-mono);color:${winsA > winsB ? 'var(--color-success)' : 'var(--color-text-muted)'}">${winsA}</div>
                        <div style="font-size:10px;color:var(--color-text-muted)">${pA.name.split(" ").slice(1,3).join(" ")}</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:22px;font-weight:800;font-family:var(--font-mono);color:var(--color-text-muted)">${metrics.length - winsA - winsB}</div>
                        <div style="font-size:10px;color:var(--color-text-muted)">Empate</div>
                    </div>
                    <div style="text-align:center">
                        <div style="font-size:22px;font-weight:800;font-family:var(--font-mono);color:${winsB > winsA ? 'var(--color-success)' : 'var(--color-text-muted)'}">${winsB}</div>
                        <div style="font-size:10px;color:var(--color-text-muted)">${pB.name.split(" ").slice(1,3).join(" ")}</div>
                    </div>
                </div>
                <div style="margin-top:var(--space-4);display:flex;justify-content:center;gap:10px">
                    <a class="btn btn-primary btn-sm" href="professor.html?id=${winner.id}" style="text-decoration:none">Ver perfil del ganador</a>
                    <a class="btn btn-sm" href="review.html?id=${winner.id}" style="text-decoration:none">Escribir reseña</a>
                </div>
            `;
        }
    </script>
</body>
</html>
