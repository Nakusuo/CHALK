<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Chalk — Compara dos docentes UTP lado a lado.">
    <title>Comparar · Chalk UTP</title>
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/topbar.css">
    <link rel="stylesheet" href="css/home.css">
    <link rel="stylesheet" href="css/pages.css">
</head>
<body>
    <div id="topbar-container"></div>
    <main class="page-wrap">
        <div class="page-title-row fadein">
            <div>
                <h1 class="page-title">⚡ Comparar docentes</h1>
                <p class="page-subtitle">Selecciona dos docentes para compararlos lado a lado</p>
            </div>
        </div>

        <!-- Filtros para reducir la lista -->
        <div class="filter-panel fadein" style="margin-bottom:var(--space-4)">
            <div class="filter-panel-row">
                <div class="filter-group">
                    <label class="filter-group-label">Filtrar por facultad</label>
                    <select class="fld" id="cmp-fac" onchange="cmpPage.updateProfs()">
                        <option value="all">Todas las facultades</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-group-label">Filtrar por sede</label>
                    <select class="fld" id="cmp-sede" onchange="cmpPage.updateProfs()">
                        <option value="all">Todas las sedes</option>
                    </select>
                </div>
                <div class="filter-group">
                    <label class="filter-group-label">Filtrar por curso</label>
                    <select class="fld" id="cmp-course" onchange="cmpPage.updateProfs()">
                        <option value="all">Todos los cursos</option>
                    </select>
                </div>
            </div>
        </div>

        <!-- Selectores de docentes con búsqueda -->
        <div class="compare-selectors fadein">
            <div class="compare-select-card">
                <div class="compare-select-label">Docente A</div>
                <input class="fld compare-search-input" id="cmp-search-a" type="text" placeholder="Escribe el nombre del docente…" oninput="cmpPage.searchProf('a')" onfocus="cmpPage.showDropdown('a')" autocomplete="off">
                <div class="compare-dropdown" id="cmp-dropdown-a"></div>
                <div class="compare-selected" id="cmp-selected-a"></div>
            </div>
            <div class="compare-vs">VS</div>
            <div class="compare-select-card">
                <div class="compare-select-label">Docente B</div>
                <input class="fld compare-search-input" id="cmp-search-b" type="text" placeholder="Escribe el nombre del docente…" oninput="cmpPage.searchProf('b')" onfocus="cmpPage.showDropdown('b')" autocomplete="off">
                <div class="compare-dropdown" id="cmp-dropdown-b"></div>
                <div class="compare-selected" id="cmp-selected-b"></div>
            </div>
        </div>

        <!-- Resultado -->
        <div id="compare-result"></div>
    </main>

    <script src="js/storage.js"></script>
    <script src="js/data.js"></script>
    <script src="js/components.js"></script>
    <script src="js/auth.js"></script>
    <script>
        const cmpPage = (() => {
            let selectedA = null;
            let selectedB = null;
            let filteredProfs = [...DB.professors];

            function init() {
                _populateFilters();
                updateProfs();

                // Close dropdowns on click outside
                document.addEventListener("click", (e) => {
                    if (!e.target.closest(".compare-select-card")) {
                        document.getElementById("cmp-dropdown-a").style.display = "none";
                        document.getElementById("cmp-dropdown-b").style.display = "none";
                    }
                });

                // URL params
                const urlA = components.getUrlParam("a");
                const urlB = components.getUrlParam("b");
                const urlC = components.getUrlParam("c");
                if (urlC) {
                    document.getElementById("cmp-course").value = urlC;
                    updateProfs();
                }
                if (urlA) selectProf("a", parseInt(urlA));
                if (urlB) selectProf("b", parseInt(urlB));

                _showEmpty();
            }

            function _populateFilters() {
                const facSel = document.getElementById("cmp-fac");
                DB.faculties.forEach(f => {
                    const opt = document.createElement("option");
                    opt.value = f.id;
                    opt.textContent = `${f.icon} ${f.name}`;
                    facSel.appendChild(opt);
                });

                const sedeSel = document.getElementById("cmp-sede");
                const limaG = document.createElement("optgroup");
                limaG.label = "Lima";
                const provG = document.createElement("optgroup");
                provG.label = "Provincias";
                DB.sedes.forEach(s => {
                    const opt = document.createElement("option");
                    opt.value = s.id;
                    opt.textContent = s.name;
                    (s.region === "Lima" ? limaG : provG).appendChild(opt);
                });
                sedeSel.appendChild(limaG);
                sedeSel.appendChild(provG);

                const courseSel = document.getElementById("cmp-course");
                const courses = DB.getAllCourses().sort((a, b) => a.name.localeCompare(b.name));
                courses.forEach(c => {
                    const opt = document.createElement("option");
                    opt.value = c.name;
                    opt.textContent = `📚 ${c.name} (${c.profs.length})`;
                    courseSel.appendChild(opt);
                });
            }

            function updateProfs() {
                const fac    = document.getElementById("cmp-fac").value;
                const sede   = document.getElementById("cmp-sede").value;
                const course = document.getElementById("cmp-course").value;

                filteredProfs = DB.professors.filter(p => {
                    const mF = fac === "all" || p.fac === fac;
                    const mS = sede === "all" || (p.sedes && p.sedes.includes(sede));
                    const mC = course === "all" || p.courses.includes(course);
                    return mF && mS && mC;
                });

                // Cerrar dropdowns
                document.getElementById("cmp-dropdown-a").style.display = "none";
                document.getElementById("cmp-dropdown-b").style.display = "none";
            }

            function searchProf(side) {
                const input = document.getElementById(`cmp-search-${side}`);
                const dropdown = document.getElementById(`cmp-dropdown-${side}`);
                const query = (input.value || "").toLowerCase().trim();

                let results = filteredProfs;
                if (query) {
                    results = results.filter(p =>
                        p.name.toLowerCase().includes(query) ||
                        p.dept.toLowerCase().includes(query) ||
                        p.courses.some(c => c.toLowerCase().includes(query))
                    );
                }

                // Exclude already selected on the other side
                const otherSelected = side === "a" ? selectedB : selectedA;
                if (otherSelected) {
                    results = results.filter(p => p.id !== otherSelected.id);
                }

                if (results.length === 0) {
                    dropdown.innerHTML = `<div class="compare-dd-empty">Sin resultados</div>`;
                } else {
                    dropdown.innerHTML = results.slice(0, 8).map(p => {
                        const score = DB.getProfScore(p.id).toFixed(1);
                        const sedeNames = (p.sedes||[]).map(s => DB.getSedeName(s)).join(", ");
                        return `
                            <div class="compare-dd-item" onmousedown="cmpPage.selectProf('${side}', ${p.id})">
                                <span class="compare-dd-emoji">${p.emoji}</span>
                                <div class="compare-dd-info">
                                    <div class="compare-dd-name">${p.name}</div>
                                    <div class="compare-dd-meta">${p.dept} · 📍 ${sedeNames}</div>
                                </div>
                                <span class="compare-dd-score">${score}</span>
                            </div>
                        `;
                    }).join("");
                }
                dropdown.style.display = "block";
            }

            function showDropdown(side) {
                searchProf(side);
            }

            function selectProf(side, profId) {
                const prof = DB.getProfessor(profId);
                if (!prof) return;

                if (side === "a") selectedA = prof;
                else selectedB = prof;

                const input = document.getElementById(`cmp-search-${side}`);
                const dropdown = document.getElementById(`cmp-dropdown-${side}`);
                const selectedEl = document.getElementById(`cmp-selected-${side}`);

                input.value = "";
                input.style.display = "none";
                dropdown.style.display = "none";

                const score = DB.getProfScore(prof.id).toFixed(1);
                const badge = DB.getProfBadge(prof);
                selectedEl.innerHTML = `
                    <div class="compare-selected-card">
                        <div class="compare-selected-left">
                            <span style="font-size:28px">${prof.emoji}</span>
                            <div>
                                <div class="compare-selected-name">${prof.name} ${badge ? components.badgeHtml(badge) : ""}</div>
                                <div class="compare-selected-dept">${prof.dept}</div>
                            </div>
                        </div>
                        <div class="compare-selected-right">
                            <div class="compare-selected-score">${score}</div>
                            <div class="stars-sm" style="font-size:12px">${DB.starsHtml(parseFloat(score))}</div>
                        </div>
                        <button class="compare-selected-clear" onclick="cmpPage.clearProf('${side}')" title="Cambiar">✕</button>
                    </div>
                `;

                if (selectedA && selectedB) _doCompare();
                else _showEmpty();
            }

            function clearProf(side) {
                if (side === "a") selectedA = null;
                else selectedB = null;

                const input = document.getElementById(`cmp-search-${side}`);
                const selectedEl = document.getElementById(`cmp-selected-${side}`);
                input.style.display = "";
                input.value = "";
                selectedEl.innerHTML = "";
                _showEmpty();
            }

            function _showEmpty() {
                if (selectedA && selectedB) return;
                const result = document.getElementById("compare-result");
                result.innerHTML = `
                    <div class="compare-empty fadein">
                        <div class="compare-empty-icon">⚡</div>
                        <div class="compare-empty-title">Selecciona dos docentes</div>
                        <div class="compare-empty-desc">
                            Escribe el nombre de un docente o usa los filtros de arriba para reducir la lista.
                            ${filteredProfs.length < DB.professors.length
                                ? `<br><span style="color:var(--utp-red);font-weight:600">${filteredProfs.length} docentes</span> disponibles con los filtros actuales.`
                                : `<br>${DB.professors.length} docentes disponibles.`
                            }
                        </div>
                    </div>
                `;
            }

            function _doCompare() {
                if (!selectedA || !selectedB) return;
                const pA = selectedA, pB = selectedB;
                const scoreA = DB.getProfScore(pA.id);
                const scoreB = DB.getProfScore(pB.id);
                const result = document.getElementById("compare-result");
                const criteriaKeys = Object.keys(DB.criteriaLabels);

                result.innerHTML = `
                    <div class="fadein">
                        <div class="compare-result">
                            ${_buildCol(pA, scoreA, pB, scoreB)}
                            ${_buildCol(pB, scoreB, pA, scoreA)}
                        </div>

                        <div style="margin-top:var(--space-5)">
                            <div class="section-label">📊 Criterios — Comparación detallada</div>
                            <div class="compare-criteria-grid" style="background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:var(--radius-xl);overflow:hidden">
                                ${criteriaKeys.map(key => {
                                    const vA = pA.criteria[key]||0, vB = pB.criteria[key]||0;
                                    const wA = vA > vB, wB = vB > vA;
                                    return `
                                        <div class="compare-crit-card" style="border-right:1px solid var(--color-border-subtle)">
                                            <div class="compare-crit-label">${DB.criteriaLabels[key]} — ${pA.name.split(" ").slice(1,3).join(" ")}</div>
                                            <div class="compare-crit-bar">
                                                <div class="compare-crit-track"><div class="compare-crit-fill" style="width:${(vA/5)*100}%;background:${wA?'var(--color-success)':'var(--utp-red)'}"></div></div>
                                                <span class="compare-crit-val" style="color:${wA?'var(--color-success)':'var(--color-text-secondary)'}">${vA.toFixed(1)}</span>
                                            </div>
                                        </div>
                                        <div class="compare-crit-card">
                                            <div class="compare-crit-label">${DB.criteriaLabels[key]} — ${pB.name.split(" ").slice(1,3).join(" ")}</div>
                                            <div class="compare-crit-bar">
                                                <div class="compare-crit-track"><div class="compare-crit-fill" style="width:${(vB/5)*100}%;background:${wB?'var(--color-success)':'var(--utp-red)'}"></div></div>
                                                <span class="compare-crit-val" style="color:${wB?'var(--color-success)':'var(--color-text-secondary)'}">${vB.toFixed(1)}</span>
                                            </div>
                                        </div>
                                    `;
                                }).join("")}
                            </div>
                        </div>

                        <div style="margin-top:var(--space-5);text-align:center;padding:var(--space-5);background:var(--color-bg-card);border:1px solid var(--color-border);border-radius:var(--radius-xl)">
                            ${_buildVerdict(pA, scoreA, pB, scoreB)}
                        </div>
                    </div>
                `;
            }

            function _buildCol(prof, score, other, otherScore) {
                const isWinner = score > otherScore;
                const badge = DB.getProfBadge(prof);
                const diffColor = DB.getDifficultyColor(prof.difficulty);
                const sedeNames = (prof.sedes||[]).map(s => DB.getSedeName(s)).join(", ");
                const reviews = DB.getProfReviewCount(prof.id);

                return `
                    <div class="compare-col" style="${isWinner?'border-color:var(--color-border-accent);box-shadow:var(--shadow-glow-sm)':''}">
                        <div class="compare-col-header" style="position:relative">
                            ${isWinner?'<div style="position:absolute;top:8px;right:12px;font-size:18px">🏆</div>':''}
                            <div style="font-size:28px;margin-bottom:8px">${prof.emoji}</div>
                            <div class="compare-col-name">${prof.name}</div>
                            <div class="compare-col-dept">${prof.dept}</div>
                            ${badge?`<div style="margin-top:8px">${components.badgeHtml(badge)}</div>`:""}
                            <div class="compare-col-score">${score.toFixed(1)}<span style="font-size:16px;opacity:.4;font-weight:400">/5</span></div>
                            <div class="stars-sm" style="font-size:16px">${DB.starsHtml(score)}</div>
                        </div>
                        <div class="compare-col-body">
                            <div class="compare-row"><span class="compare-row-label">Reseñas</span><span class="compare-row-val">${reviews}</span></div>
                            <div class="compare-row"><span class="compare-row-label">Dificultad</span><span class="compare-row-val" style="color:${diffColor}">${prof.difficulty.toFixed(1)} — ${DB.getDifficultyLabel(prof.difficulty)}</span></div>
                            <div class="compare-row"><span class="compare-row-label">Lo tomaría de nuevo</span><span class="compare-row-val ${prof.wouldTakeAgain>other.wouldTakeAgain?'winner':prof.wouldTakeAgain<other.wouldTakeAgain?'loser':''}">${prof.wouldTakeAgain}%</span></div>
                            <div class="compare-row"><span class="compare-row-label">Aprendizaje</span><span class="compare-row-val ${prof.learningScore>other.learningScore?'winner':prof.learningScore<other.learningScore?'loser':''}">${prof.learningScore}%</span></div>
                            <div class="compare-row"><span class="compare-row-label">Aprobación</span><span class="compare-row-val ${prof.approvalRate>other.approvalRate?'winner':prof.approvalRate<other.approvalRate?'loser':''}">${prof.approvalRate}%</span></div>
                            <div class="compare-row"><span class="compare-row-label">Carga</span><span class="compare-row-val">${DB.workloadLabels[prof.workload]}</span></div>
                            <div class="compare-row"><span class="compare-row-label">Experiencia</span><span class="compare-row-val">${prof.experience}</span></div>
                            <div class="compare-row"><span class="compare-row-label">Sedes</span><span class="compare-row-val" style="font-family:var(--font-sans);font-size:11px;text-align:right;max-width:140px">${sedeNames}</span></div>
                            <div style="margin-top:var(--space-3)">
                                <div style="font-size:10px;font-weight:600;text-transform:uppercase;letter-spacing:0.5px;color:var(--color-text-muted);margin-bottom:6px">Cursos</div>
                                ${prof.courses.map(c => {
                                    const cS = prof.courseRatings?.[c];
                                    return `<div style="display:flex;justify-content:space-between;padding:4px 0;font-size:11px;color:var(--color-text-secondary)"><span>📚 ${c}</span>${cS?`<span style="font-weight:700;color:var(--utp-red);font-family:var(--font-mono)">${cS.toFixed(1)}</span>`:""}</div>`;
                                }).join("")}
                            </div>
                        </div>
                    </div>
                `;
            }

            function _buildVerdict(pA, scoreA, pB, scoreB) {
                let winsA = 0, winsB = 0;
                const metrics = [
                    { a: scoreA, b: scoreB },
                    { a: pA.wouldTakeAgain, b: pB.wouldTakeAgain },
                    { a: pA.learningScore, b: pB.learningScore },
                    { a: pA.approvalRate, b: pB.approvalRate },
                    { a: 5-pA.difficulty, b: 5-pB.difficulty },
                ];
                Object.keys(DB.criteriaLabels).forEach(key => {
                    metrics.push({ a: pA.criteria[key]||0, b: pB.criteria[key]||0 });
                });
                metrics.forEach(m => { if (m.a>m.b) winsA++; else if (m.b>m.a) winsB++; });

                const winner = winsA>winsB ? pA : winsB>winsA ? pB : null;
                const ties = metrics.length - winsA - winsB;

                if (!winner) {
                    return `
                        <div style="font-size:28px;margin-bottom:8px">🤝</div>
                        <div style="font-size:16px;font-weight:700;color:var(--utp-white);margin-bottom:4px">¡Empate técnico!</div>
                        <div style="font-size:12px;color:var(--color-text-tertiary)">Ambos docentes tienen métricas muy similares.</div>
                        <div style="margin-top:12px;font-size:11px;color:var(--color-text-muted);font-family:var(--font-mono)">${winsA}–${ties}–${winsB}</div>
                    `;
                }

                return `
                    <div style="font-size:28px;margin-bottom:8px">🏆</div>
                    <div style="font-size:16px;font-weight:700;color:var(--utp-white);margin-bottom:4px">${winner.name} gana la comparación</div>
                    <div style="font-size:12px;color:var(--color-text-tertiary);margin-bottom:8px">Supera en ${Math.max(winsA,winsB)} de ${metrics.length} métricas</div>
                    <div style="display:flex;justify-content:center;gap:var(--space-6);margin-top:12px">
                        <div style="text-align:center"><div style="font-size:22px;font-weight:800;font-family:var(--font-mono);color:${winsA>winsB?'var(--color-success)':'var(--color-text-muted)'}">${winsA}</div><div style="font-size:10px;color:var(--color-text-muted)">${pA.name.split(" ").slice(1,3).join(" ")}</div></div>
                        <div style="text-align:center"><div style="font-size:22px;font-weight:800;font-family:var(--font-mono);color:var(--color-text-muted)">${ties}</div><div style="font-size:10px;color:var(--color-text-muted)">Empate</div></div>
                        <div style="text-align:center"><div style="font-size:22px;font-weight:800;font-family:var(--font-mono);color:${winsB>winsA?'var(--color-success)':'var(--color-text-muted)'}">${winsB}</div><div style="font-size:10px;color:var(--color-text-muted)">${pB.name.split(" ").slice(1,3).join(" ")}</div></div>
                    </div>
                    <div style="margin-top:var(--space-4);display:flex;justify-content:center;gap:10px">
                        <a class="btn btn-primary btn-sm" href="professor.html?id=${winner.id}" style="text-decoration:none">Ver perfil del ganador</a>
                        <a class="btn btn-sm" href="review.html?id=${winner.id}" style="text-decoration:none">Escribir reseña</a>
                    </div>
                `;
            }

            return { init, updateProfs, searchProf, showDropdown, selectProf, clearProf };
        })();

        // Init AFTER definition
        const user = components.requireAuth();
        if (user) {
            components.renderTopbar("compare");
            cmpPage.init();
        }
    </script>
</body>
</html>
